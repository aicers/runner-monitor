name: Runner Monitor

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check runner availability without sending Slack alerts or updating state"
        required: false
        default: true
        type: boolean
  schedule:
    # Times are UTC; KST = UTC+9. GitHub Actions cron only supports UTC.
    # Daytime KST 08:00-19:59 (UTC 23:00 + 00:00-10:59): run at :07 and :37
    - cron: "7,37 0-10,23 * * *"
    # Nighttime KST 20:00-07:59 (UTC 11:00-22:59): run at :07, :27, and :47
    - cron: "7,27,47 11-22 * * *"

permissions:
  contents: read

concurrency:
  group: runner-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Check self-hosted runners
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check runner availability
        env:
          RUNNER_MONITOR_STATE_TOKEN: ${{ secrets.RUNNER_MONITOR_STATE_TOKEN }}
          ORG_1: ${{ secrets.ORG_1 }}
          ORG_1_RUNNERS: ${{ secrets.ORG_1_RUNNERS }}
          ORG_1_RUNNER_READ_TOKEN: ${{ secrets.ORG_1_RUNNER_READ_TOKEN }}
          ORG_2: ${{ secrets.ORG_2 }}
          ORG_2_RUNNERS: ${{ secrets.ORG_2_RUNNERS }}
          ORG_2_RUNNER_READ_TOKEN: ${{ secrets.ORG_2_RUNNER_READ_TOKEN }}
          RUNNER_MONITOR_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 scripts/runner_monitor.py
